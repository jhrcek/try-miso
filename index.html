    <script>
      window.MonacoEnvironment = {
        getWorkerUrl: () => URL.createObjectURL(new Blob([''], { type: 'text/javascript' }))
      };
    </script>
    <script async type="module">
      import * as monaco from "https://cdn.jsdelivr.net/npm/monaco-editor/+esm";
      import {
        ConsoleStdout,
        File,
        OpenFile,
        PreopenDirectory,
        WASI,
      } from "https://esm.sh/gh/haskell-wasm/browser_wasi_shim";
      import { DyLDBrowserHost, main } from "./dyld.mjs";
      async function compressToHash(text) {
        const bytes = new TextEncoder().encode(text);
        const cs = new CompressionStream("deflate-raw");
        const writer = cs.writable.getWriter();
        writer.write(bytes);
        writer.close();
        const buf = await new Response(cs.readable).arrayBuffer();
        let bin = "";
        for (const b of new Uint8Array(buf)) bin += String.fromCharCode(b);
        return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
      }

      async function decompressFromHash(hash) {
        try {
          const b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
          const bin = atob(b64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          const ds = new DecompressionStream("deflate-raw");
          const writer = ds.writable.getWriter();
          writer.write(bytes);
          writer.close();
          const buf = await new Response(ds.readable).arrayBuffer();
          return new TextDecoder().decode(buf);
        } catch {
          return null;
        }
      }

      const isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 800;

      if (isMobile) {
        if (document.readyState === "loading") {
          await new Promise(res => document.addEventListener("DOMContentLoaded", res, { once: true }));
        }
        await new Promise(res => {
          const overlay = Object.assign(document.createElement("div"), {
            style: "position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;padding:2rem;z-index:9999;text-align:center",
            innerHTML: `
              <p style="color:#e5e7eb;font-size:0.95rem;max-width:28rem;margin:0;line-height:1.6">
                This playground loads several hundred MB of WebAssembly and may crash on mobile browsers.
              </p>
              <button id="tryAnywayBtn" style="background:#22c55e;border:none;border-radius:8px;padding:0.5rem 1.25rem;font-weight:600;font-size:0.9rem;cursor:pointer;touch-action:manipulation">
                Try anyway
              </button>
            `,
          });
          document.body.appendChild(overlay);
          document.getElementById("tryAnywayBtn").addEventListener("click", () => {
            overlay.remove();
            res();
          });
        });
      }

      const hsKeywords = [
        "module", "where", "import", "qualified", "as", "hiding",
        "data", "newtype", "type", "class", "instance", "deriving",
        "let", "in", "do", "case", "of", "if", "then", "else",
        "infixl", "infixr", "infix", "forall", "foreign",
      ];

      monaco.languages.register({ id: "haskell" });
      monaco.languages.setMonarchTokensProvider("haskell", {
        keywords: hsKeywords,
        tokenizer: {
          root: [
            [/\{-#/, "keyword.control", "@pragma"],
            [/\{-/, "comment", "@blockComment"],
            [/--.*$/, "comment"],
            [/"/, "string", "@string"],
            [/'[^'\\]'/, "string"],
            [/'\\.'/, "string"],
            [/0x[0-9a-fA-F]+/, "number"],
            [/\d+(\.\d+)?([eE][+-]?\d+)?/, "number"],
            [/[A-Z][a-zA-Z0-9_']*/, "type.identifier"],
            [/[a-z_][a-zA-Z0-9_']*/, { cases: { "@keywords": "keyword", "@default": "identifier" } }],
            [/[=<>:!+\-*\/\\^&|@~]+/, "operator"],
            [/[()[\]{}]/, "bracket"],
          ],
          string: [
            [/[^"\\]+/, "string"],
            [/\\./, "string.escape"],
            [/"/, "string", "@pop"],
          ],
          blockComment: [
            [/[^{-]+/, "comment"],
            [/\{-/, "comment", "@push"],
            [/-\}/, "comment", "@pop"],
            [/[-{]/, "comment"],
          ],
          pragma: [
            [/#-\}/, "keyword.control", "@pop"],
            [/./, "keyword.control"],
          ],
        },
      });

      const completionsP = fetch("./completions.json").then(r => r.json()).catch(() => []);

      const rootfs = new PreopenDirectory("/", []);

      const bsdtar_wasi = new WASI(
        ["bsdtar.wasm", "-x"],
        [],
        [
          new OpenFile(new File(new Uint8Array(), { readonly: true })),
          ConsoleStdout.lineBuffered((msg) => console.info(msg)),
          ConsoleStdout.lineBuffered((msg) => console.warn(msg)),
          rootfs,
        ],
        { debug: false }
      );

      const [{ instance }, rootfs_bytes] = await Promise.all([
        WebAssembly.instantiateStreaming(
          fetch("https://haskell-wasm.github.io/bsdtar-wasm/bsdtar.wasm"),
          { wasi_snapshot_preview1: bsdtar_wasi.wasiImport }
        ),
        fetch("./rootfs.tar.zst").then((r) => r.bytes()),
      ]);

      bsdtar_wasi.fds[0] = new OpenFile(
        new File(rootfs_bytes, { readonly: true })
      );
      bsdtar_wasi.start(instance);

      if (document.readyState === "loading") {
        await new Promise((res) =>
          document.addEventListener("DOMContentLoaded", res, { once: true })
        );
      }

      document.getElementById("editor").innerHTML = "";

      const completions = await completionsP;
      const kindMap = {
        function:    monaco.languages.CompletionItemKind.Function,
        type:        monaco.languages.CompletionItemKind.Struct,
        constructor: monaco.languages.CompletionItemKind.EnumMember,
        typeclass:   monaco.languages.CompletionItemKind.Interface,
        operator:    monaco.languages.CompletionItemKind.Operator,
      };
      const hsSnippets = [
        { label: "data…",     detail: "data type",      body: "data ${1:Type} = ${2:Con}\n  deriving (${3:Show, Eq})" },
        { label: "newtype…",  detail: "newtype",         body: "newtype ${1:Type} = ${1:Type} { un${1:Type} :: ${2:Inner} }" },
        { label: "instance…", detail: "instance",        body: "instance ${1:Class} ${2:Type} where\n  ${0}" },
        { label: "case…of",   detail: "case expression", body: "case ${1:expr} of\n  ${2:_} -> ${0}" },
        { label: "do…",       detail: "do block",        body: "do\n  ${0}" },
        { label: "\\…->",     detail: "lambda",          body: "\\${1:x} -> ${0}" },
      ];
      monaco.languages.registerCompletionItemProvider("haskell", {
        triggerCharacters: ["."],
        provideCompletionItems(model, position) {
          const word = model.getWordUntilPosition(position);
          const range = {
            startLineNumber: position.lineNumber,
            endLineNumber:   position.lineNumber,
            startColumn:     word.startColumn,
            endColumn:       word.endColumn,
          };

          // On an import line, offer module names (works mid-word and after a dot)
          const linePrefix = model.getLineContent(position.lineNumber).slice(0, position.column - 1);
          const importLineMatch = linePrefix.match(/^\s*import\s+(?:qualified\s+)?([A-Z][a-zA-Z0-9_.]*)$/);
          if (importLineMatch) {
            const modPrefix   = importLineMatch[1];
            const insertStart = modPrefix.lastIndexOf(".") + 1;
            const allMods     = [...new Set(completions.map(c => c.module))].sort();
            return {
              suggestions: allMods
                .filter(m => m.startsWith(modPrefix))
                .map(m => ({
                  label:      m,
                  kind:       monaco.languages.CompletionItemKind.Module,
                  detail:     "module",
                  insertText: m.slice(insertStart),
                  range,
                })),
            };
          }

          // Build alias → full module map from import statements in the file
          const text = model.getValue();
          const aliasMap = {};
          const importRe = /^\s*import\s+(?:qualified\s+)?([A-Z][a-zA-Z0-9_.']*)\s+(?:as\s+([A-Z][a-zA-Z0-9_']*)\s*)?/gm;
          let im;
          while ((im = importRe.exec(text)) !== null) {
            const modName = im[1];
            const alias   = im[2] || modName.split(".").pop();
            aliasMap[alias] = modName;
          }

          // Check for a qualifier immediately before the cursor: "H." or "CSS."
          const qualMatch  = linePrefix.match(/([A-Z][a-zA-Z0-9_']*)\.$/);
          const qualifier  = qualMatch ? qualMatch[1] : null;

          let libSuggestions;
          if (qualifier) {
            const resolved = aliasMap[qualifier];
            libSuggestions = completions.filter(c =>
              resolved
                ? c.module === resolved || c.module.startsWith(resolved + ".")
                : c.module.split(".").includes(qualifier)
            );
          } else {
            libSuggestions = completions;
          }

          const kwSuggestions = qualifier ? [] : hsKeywords.map(kw => ({
            label:      kw,
            kind:       monaco.languages.CompletionItemKind.Keyword,
            insertText: kw,
            range,
          }));

          // Snippets for common Haskell patterns
          const snippetSuggestions = qualifier ? [] : hsSnippets.map(s => ({
            label:           s.label,
            kind:            monaco.languages.CompletionItemKind.Snippet,
            detail:          s.detail,
            insertText:      s.body,
            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
            range,
          }));

          // Locally-defined names extracted from the current file
          const localSuggestions = qualifier ? [] : (() => {
            const seen = new Set();
            const items = [];
            const add = (n, k) => { if (!seen.has(n)) { seen.add(n); items.push({ n, k }); } };
            for (const [, n] of text.matchAll(/^(?:data|newtype|type)\s+([A-Z][a-zA-Z0-9_']*)/gm))
              add(n, monaco.languages.CompletionItemKind.Struct);
            for (const [, n] of text.matchAll(/(?:^|\|\s+)([A-Z][a-zA-Z0-9_']*)/gm))
              add(n, monaco.languages.CompletionItemKind.EnumMember);
            for (const [, n] of text.matchAll(/^([a-z_][a-zA-Z0-9_']*)\s*(?:::|[a-zA-Z_(])/gm))
              add(n, monaco.languages.CompletionItemKind.Function);
            return items.map(({ n, k }) => ({
              label: n, kind: k, detail: "local", insertText: n, range,
            }));
          })();

          return {
            suggestions: [
              ...kwSuggestions,
              ...snippetSuggestions,
              ...localSuggestions,
              ...libSuggestions.map(c => ({
                label:         c.name,
                kind:          kindMap[c.kind] ?? monaco.languages.CompletionItemKind.Function,
                detail:        c.module + (c.type ? ` :: ${c.type}` : ""),
                documentation: c.type
                  ? { value: "```haskell\n" + c.name + " :: " + c.type + "\n```" }
                  : undefined,
                insertText: c.name,
                range,
              })),
            ],
          };
        },
      });

      monaco.languages.registerHoverProvider("haskell", {
        provideHover(model, position) {
          const word = model.getWordAtPosition(position);
          if (!word) return null;
          const matches = completions.filter(c => c.name === word.word);
          if (matches.length === 0) return null;
          const contents = [];
          for (const c of matches) {
            if (c.type) {
              contents.push({ value: "```haskell\n" + c.name + " :: " + c.type + "\n```" });
            }
            const meta = [
              c.module && `**${c.module}**`,
              c.kind   && `*${c.kind}*`,
            ].filter(Boolean).join(" · ");
            if (meta) contents.push({ value: meta });
          }
          return {
            range: new monaco.Range(
              position.lineNumber, word.startColumn,
              position.lineNumber, word.endColumn,
            ),
            contents,
          };
        },
      });

      const defaultSource = `----------------------------------------------------------------------------
{-# LANGUAGE OverloadedStrings #-}
{-# LANGUAGE LambdaCase        #-}
----------------------------------------------------------------------------
module Main where
----------------------------------------------------------------------------
import           Miso
import qualified Miso.CSS  as CSS
import qualified Miso.Html as H
import           Miso.Lens
----------------------------------------------------------------------------
-- | Component model state
data Model = Model { _count :: Int, _animating :: Bool }
  deriving (Eq)
----------------------------------------------------------------------------
-- | Lenses for model fields
count :: Lens Model Int
count = lens _count (\\m c -> m { _count = c })

animating :: Lens Model Bool
animating = lens _animating (\\m a -> m { _animating = a })
----------------------------------------------------------------------------
-- | Sum type for App events
data Action
  = AddOne | SubtractOne | SayHelloWorld | ToggleAnim
  deriving (Show, Eq)
----------------------------------------------------------------------------
-- | Entry point for a miso application
main :: IO ()
main = startApp defaultEvents app
----------------------------------------------------------------------------
-- | Application definition: initial model, update, and view
app :: App Model Action
app = (vcomp emptyModel updateModel viewModel) { mountPoint = Just "app" }
----------------------------------------------------------------------------
-- | Initial application state
emptyModel :: Model
emptyModel = Model { _count = 0, _animating = True }
----------------------------------------------------------------------------
-- | Updates model, optionally introduces side effects
updateModel :: Action -> Effect parent props Model Action
updateModel = \\case
  AddOne        -> count += 1
  SubtractOne   -> count -= 1
  ToggleAnim    -> animating %= not
  SayHelloWorld -> io_ (putStrLn "Hello World")
----------------------------------------------------------------------------
-- | Helper for rendering a styled icon button
iconBtn :: Action -> MisoString -> View Model Action
iconBtn action label =
  H.button_
    [ H.onClick action
    , CSS.style_
        [ CSS.fontSize "1.5rem", CSS.width "3rem", CSS.height "3rem"
        , CSS.border "none", CSS.borderRadius "10px"
        , CSS.backgroundColor (CSS.hex "1e293b")
        , CSS.color (CSS.hex "e5e7eb"), CSS.cursor "pointer", CSS.fontWeight "700"
        ]
    ]
    [ text label ]
----------------------------------------------------------------------------
-- | Constructs a virtual DOM from a model
viewModel :: props -> Model -> View Model Action
viewModel _ m =
  H.div_
    [ CSS.style_
        [ CSS.display "flex", CSS.flexDirection "row", CSS.alignItems "center"
        , CSS.justifyContent "center", CSS.gap "4rem"
        , CSS.padding "2rem", CSS.fontFamily "system-ui, sans-serif"
        ]
    ]
    [ counterSection m, canvasSection m ]
----------------------------------------------------------------------------
-- | Counter section: increment, decrement, and hello world button
counterSection :: Model -> View Model Action
counterSection m =
  H.div_
    [ CSS.style_
        [ CSS.display "flex", CSS.flexDirection "column"
        , CSS.alignItems "center", CSS.gap "1.5rem"
        ]
    ]
    [ H.span_
        [ CSS.style_
            [ CSS.fontSize "5rem", CSS.fontWeight "700"
            , CSS.color (CSS.hex "22c55e"), CSS.lineHeight "1"
            , CSS.minWidth "4rem", CSS.textAlign "center"
            ]
        ]
        [ text $ ms (_count m) ]

-- | Canvas section: orbiting dot animation with play/pause toggle
canvasSection :: Model -> View Model Action
canvasSection m =
  H.div_
    [ CSS.style_
        [ CSS.display "flex", CSS.flexDirection "column"
        , CSS.alignItems "center", CSS.gap "1rem"
        ]
    ]
    [ H.div_
        [ CSS.style_
            [ CSS.position "relative", CSS.width "120px", CSS.height "120px"
            , CSS.borderRadius "50%", CSS.backgroundColor (CSS.hex "0b1120")
            , CSS.border "1px solid #1f2937"
            ]
        ]
        [ H.div_
            [ CSS.style_
                [ CSS.position "absolute", CSS.width "10px", CSS.height "10px"
                , CSS.borderRadius "50%", CSS.backgroundColor (CSS.hex "22c55e")
                , CSS.top "50%", CSS.left "50%"
                , CSS.transform "translate(-50%, -50%)"
                ]
            ] []
        , orbitDot "1.8s" (CSS.hex "818cf8") "12px" "40px" playState
        , orbitDot "2.9s" (CSS.hex "f59e0b") "8px"  "26px" playState
        ]
    , H.button_
        [ H.onClick ToggleAnim
        , CSS.style_
            [ CSS.padding "0.4rem 1.1rem", CSS.border "none", CSS.borderRadius "8px"
            , CSS.backgroundColor (CSS.hex (if _animating m then "ef4444" else "6366f1"))
            , CSS.color (CSS.hex "fff"), CSS.fontWeight "600"
            , CSS.cursor "pointer", CSS.fontSize "0.85rem"
            ]
        ]
        [ text (if _animating m then "Stop" else "Start") ]
    ] where
        playState = if _animating m then "running" else "paused"

-- | Renders a dot orbiting at a given radius, speed, and color
orbitDot :: MisoString -> CSS.Color -> MisoString -> MisoString -> MisoString -> View Model Action
orbitDot dur color sz offset playState =
  H.div_
    [ CSS.style_
        [ CSS.position "absolute", CSS.top "50%", CSS.left "50%"
        , CSS.width "0", CSS.height "0"
        , CSS.animation ("spin " <> dur <> " linear infinite")
        , ("animation-play-state", playState)
        ]
    ]
    [ H.div_
        [ CSS.style_
            [ CSS.position "absolute", CSS.width sz, CSS.height sz
            , CSS.borderRadius "50%", CSS.backgroundColor color
            , CSS.top ("-6px"), CSS.left offset
            ]
        ] []
    ]

`;

      const hash = window.location.hash.slice(1);
      let initialSource = defaultSource;
      if (hash) {
        const decoded = await decompressFromHash(hash);
        if (decoded) {
          initialSource = decoded;
          history.replaceState(null, "", window.location.pathname + window.location.search);
        }
      }

      window.editor = monaco.editor.create(document.getElementById("editor"), {
        value: initialSource,
        language: "haskell",
        automaticLayout: true,
        minimap: { enabled: false },
        theme: "vs-dark",
        fontSize: 14,
      });

      window.editor.addCommand(
        monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter,
        () => document.getElementById("runBtn").click(),
      );

      let stderrLines = [];

      const dyld = await main({
        rpc: new DyLDBrowserHost({
          rootfs,
          stdout: (msg) => {
            document.getElementById("stdout").value += `${msg}\n`;
          },
          stderr: (msg) => {
            document.getElementById("stdout").value += `${msg}\n`;
            stderrLines.push(msg);
          },
        }),
        searchDirs: [
          "/tmp/clib",
          "/tmp/hslib/lib/wasm32-wasi-ghc-9.14.0.20251101-e4ad",
        ],
        mainSoPath: "/tmp/libplayground001.so",
        args: ["libplayground001.so", "+RTS", "-c", "-RTS"],
        isIserv: false,
      });
      const main_func = await dyld.exportFuncs.myMain("/tmp/hslib/lib");

      function parseGhcDiagnostics(lines) {
        // /tmp/Main.hs:LINE:COL: error: or /tmp/Main.hs:LINE:SCOL-ECOL: error: [GHC-XXXXX]
        const diagRe = /^[^:]+:(\d+):(\d+)(?:-(\d+))?\s*:\s*(error|warning)(?:\s*\[.*?\])?\s*:/;
        const markers = [];
        let i = 0;
        while (i < lines.length) {
          const raw = lines[i].replace(/\x1b\[[0-9;]*m/g, "");
          const m = diagRe.exec(raw);
          if (m) {
            const startLine = parseInt(m[1]);
            const startCol  = parseInt(m[2]);
            const endCol    = m[3] ? parseInt(m[3]) + 1 : startCol + 1;
            const severity  = m[4] === "error"
              ? monaco.MarkerSeverity.Error
              : monaco.MarkerSeverity.Warning;
            const afterLabel = raw.slice(raw.indexOf(m[4]) + m[4].length).replace(/^\s*(?:\[.*?\])?\s*:\s*/, "");
            const msgLines = afterLabel.trim() ? [afterLabel.trim()] : [];
            i++;
            while (i < lines.length) {
              const next = lines[i].replace(/\x1b\[[0-9;]*m/g, "");
              if (/^\s/.test(next)) { msgLines.push(next.trimStart()); i++; }
              else break;
            }
            markers.push({
              severity,
              startLineNumber: startLine,
              startColumn:     startCol,
              endLineNumber:   startLine,
              endColumn:       endCol,
              message:         msgLines.join("\n").trim(),
              source:          "GHC",
            });
          } else {
            i++;
          }
        }
        return markers;
      }

      const runBtn = document.getElementById("runBtn");
      runBtn.addEventListener("click", async () => {
        runBtn.disabled = true;
        stderrLines = [];
        monaco.editor.setModelMarkers(window.editor.getModel(), "ghc", []);

        try {
          document.getElementById("stdout").value = "";
          document.getElementById("app").innerHTML = "";

          await main_func("-package miso -Wno-missed-extra-shared-lib", editor.getValue());
        } finally {
          monaco.editor.setModelMarkers(
            window.editor.getModel(), "ghc",
            parseGhcDiagnostics(stderrLines),
          );
          runBtn.disabled = false;
        }
      });

      runBtn.disabled = false;
      runBtn.textContent = "▶ Run";
      const platform = navigator.userAgentData?.platform || navigator.platform || "";
      const isMac = /mac|iphone|ipad|ipod/i.test(platform);
      runBtn.title = isMac ? "⌘ + Enter" : "Ctrl + Enter";
      runBtn.setAttribute("aria-keyshortcuts", "Meta+Enter Control+Enter");
      document.getElementById("app").innerHTML = "";
      runBtn.click();

      const shareBtn = document.getElementById("shareBtn");
      const shareModal = document.getElementById("shareModal");
      const shareUrlInput = document.getElementById("shareUrl");

      shareBtn.disabled = false;
      shareBtn.addEventListener("click", async () => {
        const compressed = await compressToHash(editor.getValue());
        const shareUrl = `${window.location.origin}${window.location.pathname}#${compressed}`;
        shareUrlInput.value = shareUrl;
        await navigator.clipboard.writeText(shareUrl).catch(() => {});
        shareModal.classList.add("open");
      });

      document.getElementById("closeShareModal").addEventListener("click", () => {
        shareModal.classList.remove("open");
      });
      document.getElementById("copyShareUrl").addEventListener("click", () => {
        navigator.clipboard.writeText(shareUrlInput.value).catch(() => {});
        document.getElementById("copyShareUrl").textContent = "Copied!";
        setTimeout(() => { document.getElementById("copyShareUrl").textContent = "Copy"; }, 1500);
      });
      shareModal.addEventListener("click", e => {
        if (e.target === shareModal) shareModal.classList.remove("open");
      });

      // Draggable splitter between left and right panes
      const splitter = document.getElementById("splitter");
      const leftPane  = document.getElementById("leftPane");
      const rightPane = document.getElementById("rightPane");
      splitter.addEventListener("mousedown", e => {
        e.preventDefault();
        splitter.classList.add("active");
        const startX  = e.clientX;
        const leftW0  = leftPane.getBoundingClientRect().width;
        const rightW0 = rightPane.getBoundingClientRect().width;
        const total   = leftW0 + rightW0;
        const onMove = e => {
          const newLeft  = Math.max(180, Math.min(total - 180, leftW0 + e.clientX - startX));
          leftPane.style.flex  = `0 0 ${newLeft}px`;
          rightPane.style.flex = `0 0 ${total - newLeft}px`;
          window.editor?.layout();
        };
        const onUp = () => {
          splitter.classList.remove("active");
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          window.editor?.layout();
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      // Draggable splitter between #app and #stdout
      const rowSplitter  = document.getElementById("rowSplitter");
      const appDiv       = document.getElementById("app");
      const stdoutSection = document.getElementById("stdoutSection");
      rowSplitter.addEventListener("mousedown", e => {
        e.preventDefault();
        rowSplitter.classList.add("active");
        const startY  = e.clientY;
        const appH0   = appDiv.getBoundingClientRect().height;
        const stdoutH0 = stdoutSection.getBoundingClientRect().height;
        const totalH  = appH0 + stdoutH0;
        const onMove = e => {
          const newTop = Math.max(60, Math.min(totalH - 60, appH0 + e.clientY - startY));
          appDiv.style.flex       = `0 0 ${newTop}px`;
          stdoutSection.style.flex = `0 0 ${totalH - newTop}px`;
        };
        const onUp = () => {
          rowSplitter.classList.remove("active");
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      document.getElementById("fullscreenBtn").addEventListener("click", () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      });
      document.addEventListener("fullscreenchange", () => {
        const inFs = !!document.fullscreenElement;
        document.getElementById("fsEnterIcon").style.display = inFs ? "none" : "";
        document.getElementById("fsExitIcon").style.display = inFs ? "" : "none";
      });
    </script>
