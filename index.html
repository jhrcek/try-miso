    <script>
      window.MonacoEnvironment = {
        getWorkerUrl: () => URL.createObjectURL(new Blob([''], { type: 'text/javascript' }))
      };
    </script>
    <script async type="module">
      import * as monaco from "https://cdn.jsdelivr.net/npm/monaco-editor/+esm";
      import {
        ConsoleStdout,
        File,
        OpenFile,
        PreopenDirectory,
        WASI,
      } from "https://esm.sh/gh/haskell-wasm/browser_wasi_shim";
      import { DyLDBrowserHost, main } from "./dyld.mjs";
      async function compressToHash(text) {
        const bytes = new TextEncoder().encode(text);
        const cs = new CompressionStream("deflate-raw");
        const writer = cs.writable.getWriter();
        writer.write(bytes);
        writer.close();
        const buf = await new Response(cs.readable).arrayBuffer();
        let bin = "";
        for (const b of new Uint8Array(buf)) bin += String.fromCharCode(b);
        return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
      }

      async function decompressFromHash(hash) {
        try {
          const b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
          const bin = atob(b64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          const ds = new DecompressionStream("deflate-raw");
          const writer = ds.writable.getWriter();
          writer.write(bytes);
          writer.close();
          const buf = await new Response(ds.readable).arrayBuffer();
          return new TextDecoder().decode(buf);
        } catch {
          return null;
        }
      }

      const isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 800;

      if (isMobile) {
        if (document.readyState === "loading") {
          await new Promise(res => document.addEventListener("DOMContentLoaded", res, { once: true }));
        }
        await new Promise(res => {
          const overlay = Object.assign(document.createElement("div"), {
            style: "position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;padding:2rem;z-index:9999;text-align:center",
            innerHTML: `
              <p style="color:#e5e7eb;font-size:0.95rem;max-width:28rem;margin:0;line-height:1.6">
                This playground loads several hundred MB of WebAssembly and may crash on mobile browsers.
              </p>
              <button id="tryAnywayBtn" style="background:#22c55e;border:none;border-radius:8px;padding:0.5rem 1.25rem;font-weight:600;font-size:0.9rem;cursor:pointer;touch-action:manipulation">
                Try anyway
              </button>
            `,
          });
          document.body.appendChild(overlay);
          document.getElementById("tryAnywayBtn").addEventListener("click", () => {
            overlay.remove();
            res();
          });
        });
      }

      const hsKeywords = [
        "module", "where", "import", "qualified", "as", "hiding",
        "data", "newtype", "type", "class", "instance", "deriving",
        "let", "in", "do", "case", "of", "if", "then", "else",
        "infixl", "infixr", "infix", "forall", "foreign",
      ];

      monaco.languages.register({ id: "haskell" });
      monaco.languages.setMonarchTokensProvider("haskell", {
        keywords: hsKeywords,
        tokenizer: {
          root: [
            [/\{-#/, "keyword.control", "@pragma"],
            [/\{-/, "comment", "@blockComment"],
            [/--.*$/, "comment"],
            [/"/, "string", "@string"],
            [/'[^'\\]'/, "string"],
            [/'\\.'/, "string"],
            [/0x[0-9a-fA-F]+/, "number"],
            [/\d+(\.\d+)?([eE][+-]?\d+)?/, "number"],
            [/[A-Z][a-zA-Z0-9_']*/, "type.identifier"],
            [/[a-z_][a-zA-Z0-9_']*/, { cases: { "@keywords": "keyword", "@default": "identifier" } }],
            [/[=<>:!+\-*\/\\^&|@~]+/, "operator"],
            [/[()[\]{}]/, "bracket"],
          ],
          string: [
            [/[^"\\]+/, "string"],
            [/\\./, "string.escape"],
            [/"/, "string", "@pop"],
          ],
          blockComment: [
            [/[^{-]+/, "comment"],
            [/\{-/, "comment", "@push"],
            [/-\}/, "comment", "@pop"],
            [/[-{]/, "comment"],
          ],
          pragma: [
            [/#-\}/, "keyword.control", "@pop"],
            [/./, "keyword.control"],
          ],
        },
      });

      const completionsP = fetch("./completions.json").then(r => r.json()).catch(() => []);

      const rootfs = new PreopenDirectory("/", []);

      const bsdtar_wasi = new WASI(
        ["bsdtar.wasm", "-x"],
        [],
        [
          new OpenFile(new File(new Uint8Array(), { readonly: true })),
          ConsoleStdout.lineBuffered((msg) => console.info(msg)),
          ConsoleStdout.lineBuffered((msg) => console.warn(msg)),
          rootfs,
        ],
        { debug: false }
      );

      const [{ instance }, rootfs_bytes] = await Promise.all([
        WebAssembly.instantiateStreaming(
          fetch("https://haskell-wasm.github.io/bsdtar-wasm/bsdtar.wasm"),
          { wasi_snapshot_preview1: bsdtar_wasi.wasiImport }
        ),
        fetch("./rootfs.tar.zst").then((r) => r.bytes()),
      ]);

      bsdtar_wasi.fds[0] = new OpenFile(
        new File(rootfs_bytes, { readonly: true })
      );
      bsdtar_wasi.start(instance);

      if (document.readyState === "loading") {
        await new Promise((res) =>
          document.addEventListener("DOMContentLoaded", res, { once: true })
        );
      }

      document.getElementById("editor").innerHTML = "";

      const completions = await completionsP;
      const kindMap = {
        function:    monaco.languages.CompletionItemKind.Function,
        type:        monaco.languages.CompletionItemKind.Struct,
        constructor: monaco.languages.CompletionItemKind.EnumMember,
        typeclass:   monaco.languages.CompletionItemKind.Interface,
        operator:    monaco.languages.CompletionItemKind.Operator,
      };
      const hsSnippets = [
        { label: "data…",     detail: "data type",      body: "data ${1:Type} = ${2:Con}\n  deriving (${3:Show, Eq})" },
        { label: "newtype…",  detail: "newtype",         body: "newtype ${1:Type} = ${1:Type} { un${1:Type} :: ${2:Inner} }" },
        { label: "instance…", detail: "instance",        body: "instance ${1:Class} ${2:Type} where\n  ${0}" },
        { label: "case…of",   detail: "case expression", body: "case ${1:expr} of\n  ${2:_} -> ${0}" },
        { label: "do…",       detail: "do block",        body: "do\n  ${0}" },
        { label: "\\…->",     detail: "lambda",          body: "\\${1:x} -> ${0}" },
      ];
      monaco.languages.registerCompletionItemProvider("haskell", {
        triggerCharacters: ["."],
        provideCompletionItems(model, position) {
          const word = model.getWordUntilPosition(position);
          const range = {
            startLineNumber: position.lineNumber,
            endLineNumber:   position.lineNumber,
            startColumn:     word.startColumn,
            endColumn:       word.endColumn,
          };

          // On an import line, offer module names (works mid-word and after a dot)
          const linePrefix = model.getLineContent(position.lineNumber).slice(0, position.column - 1);
          const importLineMatch = linePrefix.match(/^\s*import\s+(?:qualified\s+)?([A-Z][a-zA-Z0-9_.]*)$/);
          if (importLineMatch) {
            const modPrefix   = importLineMatch[1];
            const insertStart = modPrefix.lastIndexOf(".") + 1;
            const allMods     = [...new Set(completions.map(c => c.module))].sort();
            return {
              suggestions: allMods
                .filter(m => m.startsWith(modPrefix))
                .map(m => ({
                  label:      m,
                  kind:       monaco.languages.CompletionItemKind.Module,
                  detail:     "module",
                  insertText: m.slice(insertStart),
                  range,
                })),
            };
          }

          // Build alias → full module map from import statements in the file
          const text = model.getValue();
          const aliasMap = {};
          const importRe = /^\s*import\s+(?:qualified\s+)?([A-Z][a-zA-Z0-9_.']*)\s+(?:as\s+([A-Z][a-zA-Z0-9_']*)\s*)?/gm;
          let im;
          while ((im = importRe.exec(text)) !== null) {
            const modName = im[1];
            const alias   = im[2] || modName.split(".").pop();
            aliasMap[alias] = modName;
          }

          // Check for a qualifier immediately before the cursor: "H." or "CSS."
          const qualMatch  = linePrefix.match(/([A-Z][a-zA-Z0-9_']*)\.$/);
          const qualifier  = qualMatch ? qualMatch[1] : null;

          let libSuggestions;
          if (qualifier) {
            const resolved = aliasMap[qualifier];
            libSuggestions = completions.filter(c =>
              resolved
                ? c.module === resolved || c.module.startsWith(resolved + ".")
                : c.module.split(".").includes(qualifier)
            );
          } else {
            libSuggestions = completions;
          }

          const kwSuggestions = qualifier ? [] : hsKeywords.map(kw => ({
            label:      kw,
            kind:       monaco.languages.CompletionItemKind.Keyword,
            insertText: kw,
            range,
          }));

          // Snippets for common Haskell patterns
          const snippetSuggestions = qualifier ? [] : hsSnippets.map(s => ({
            label:           s.label,
            kind:            monaco.languages.CompletionItemKind.Snippet,
            detail:          s.detail,
            insertText:      s.body,
            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
            range,
          }));

          // Locally-defined names extracted from the current file
          const localSuggestions = qualifier ? [] : (() => {
            const seen = new Set();
            const items = [];
            const add = (n, k) => { if (!seen.has(n)) { seen.add(n); items.push({ n, k }); } };
            for (const [, n] of text.matchAll(/^(?:data|newtype|type)\s+([A-Z][a-zA-Z0-9_']*)/gm))
              add(n, monaco.languages.CompletionItemKind.Struct);
            for (const [, n] of text.matchAll(/(?:^|\|\s+)([A-Z][a-zA-Z0-9_']*)/gm))
              add(n, monaco.languages.CompletionItemKind.EnumMember);
            for (const [, n] of text.matchAll(/^([a-z_][a-zA-Z0-9_']*)\s*(?:::|[a-zA-Z_(])/gm))
              add(n, monaco.languages.CompletionItemKind.Function);
            return items.map(({ n, k }) => ({
              label: n, kind: k, detail: "local", insertText: n, range,
            }));
          })();

          return {
            suggestions: [
              ...kwSuggestions,
              ...snippetSuggestions,
              ...localSuggestions,
              ...libSuggestions.map(c => ({
                label:         c.name,
                kind:          kindMap[c.kind] ?? monaco.languages.CompletionItemKind.Function,
                detail:        c.module + (c.type ? ` :: ${c.type}` : ""),
                documentation: c.type
                  ? { value: "```haskell\n" + c.name + " :: " + c.type + "\n```" }
                  : undefined,
                insertText: c.name,
                range,
              })),
            ],
          };
        },
      });

      monaco.languages.registerHoverProvider("haskell", {
        provideHover(model, position) {
          const word = model.getWordAtPosition(position);
          if (!word) return null;
          const matches = completions.filter(c => c.name === word.word);
          if (matches.length === 0) return null;
          const contents = [];
          for (const c of matches) {
            if (c.type) {
              contents.push({ value: "```haskell\n" + c.name + " :: " + c.type + "\n```" });
            }
            const meta = [
              c.module && `**${c.module}**`,
              c.kind   && `*${c.kind}*`,
            ].filter(Boolean).join(" · ");
            if (meta) contents.push({ value: meta });
          }
          return {
            range: new monaco.Range(
              position.lineNumber, word.startColumn,
              position.lineNumber, word.endColumn,
            ),
            contents,
          };
        },
      });

      const defaultSource = `----------------------------------------------------------------------------
{-# LANGUAGE OverloadedStrings #-}
{-# LANGUAGE LambdaCase        #-}
----------------------------------------------------------------------------
module Main where
----------------------------------------------------------------------------
import           Miso
import qualified Miso.CSS  as CSS
import qualified Miso.Html as H
import           Miso.Lens
----------------------------------------------------------------------------
import           System.IO (hFlush, stdout)
----------------------------------------------------------------------------
-- | Component model state
data Model = Model { _count :: Int, _animating :: Bool }
  deriving (Eq)
----------------------------------------------------------------------------
-- | Lenses for model fields
count :: Lens Model Int
count = lens _count (\\m c -> m { _count = c })

animating :: Lens Model Bool
animating = lens _animating (\\m a -> m { _animating = a })
----------------------------------------------------------------------------
-- | Sum type for App events
data Action
  = AddOne | SubtractOne | SayHelloWorld | ToggleAnim
  deriving (Show, Eq)
----------------------------------------------------------------------------
-- | Entry point for a miso application
main :: IO ()
main = startApp defaultEvents app { mountPoint = Just "app" }
----------------------------------------------------------------------------
-- | Application definition: initial model, update, and view
app :: App Model Action
app = vcomp emptyModel updateModel viewModel
----------------------------------------------------------------------------
-- | Initial application state
emptyModel :: Model
emptyModel = Model { _count = 0, _animating = True }
----------------------------------------------------------------------------
-- | Updates model, optionally introduces side effects
updateModel :: Action -> Effect parent props Model Action
updateModel = \\case
  AddOne        -> count += 1
  SubtractOne   -> count -= 1
  ToggleAnim    -> animating %= not
  SayHelloWorld -> io_ (putStrLn "Hello World" >> hFlush stdout)
----------------------------------------------------------------------------
-- | Helper for rendering a styled icon button
iconBtn :: Action -> MisoString -> View Model Action
iconBtn action label =

-- | Constructs a virtual DOM from a model

-- | Counter section: increment, decrement, and hello world button

----------------------------------------------------------------------------
-- | Canvas section: orbiting dot animation with play/pause toggle
canvasSection :: Model -> View Model Action
canvasSection m =
  H.div_
    [ CSS.style_
        [ CSS.display "flex", CSS.flexDirection "column"
        , CSS.alignItems "center", CSS.gap "1rem"
        ]
    ]
    [ H.div_
        [ CSS.style_
            [ CSS.position "relative", CSS.width "120px", CSS.height "120px"
            , CSS.borderRadius "50%", CSS.backgroundColor (CSS.hex "0b1120")
            , CSS.border "1px solid #1f2937"
            ]
        ]
        [ H.div_
            [ CSS.style_
                [ CSS.position "absolute", CSS.width "10px", CSS.height "10px"
                , CSS.borderRadius "50%", CSS.backgroundColor (CSS.hex "22c55e")
                , CSS.top "50%", CSS.left "50%"
                , CSS.transform "translate(-50%, -50%)"
                ]
            ] []
        , orbitDot "1.8s" (CSS.hex "818cf8") "12px" "40px" playState
        , orbitDot "2.9s" (CSS.hex "f59e0b") "8px"  "26px" playState
        ]

        [ H.onClick ToggleAnim

----------------------------------------------------------------------------
-- | Renders a dot orbiting at a given radius, speed, and color
orbitDot :: MisoString -> CSS.Color -> MisoString -> MisoString -> MisoString -> View Model Action
orbitDot dur color sz offset playState =
  H.div_
    [ CSS.style_
        [ CSS.position "absolute", CSS.top "50%", CSS.left "50%"
        , CSS.width "0", CSS.height "0"
        , CSS.animation ("spin " <> dur <> " linear infinite")
        , ("animation-play-state", playState)

    ]
    [ H.div_
        [ CSS.style_
            [ CSS.position "absolute", CSS.width sz, CSS.height sz
            , CSS.borderRadius "50%", CSS.backgroundColor color
            , CSS.top ("-6px"), CSS.left offset
            ]
        ] []
    ]

-- | Klondike Solitaire — a miso application
{-# LANGUAGE OverloadedStrings #-}
{-# LANGUAGE QuasiQuotes       #-}
{-# LANGUAGE LambdaCase        #-}
----------------------------------------------------------------------------
module Main where
----------------------------------------------------------------------------
import           Miso hiding ((!!))     -- Miso redefines (!!) as a JS array accessor
import qualified Miso.Html as H
import           Miso.CSS hiding (ms)   -- 'ms' would shadow Miso.String.ms
import           Miso.FFI.QQ (js)
import           Miso.Lens
import           Miso.Reload
import           Miso.Random (replicateRM)
import           Data.List   (sortBy, (!!))
import           Data.Maybe  (mapMaybe, listToMaybe)
import           Data.Ord    (comparing)
----------------------------------------------------------------------------
-- Types
----------------------------------------------------------------------------
data Suit = Clubs | Diamonds | Hearts | Spades
  deriving (Show, Eq, Ord, Enum, Bounded)

data Rank
  = Ace | Two | Three | Four | Five | Six | Seven
  | Eight | Nine | Ten | Jack | Queen | King
  deriving (Show, Eq, Ord, Enum, Bounded)

data Card = Card
  { cardRank :: Rank
  , cardSuit :: Suit
  } deriving (Show, Eq)

-- | A card in the tableau – face-up (visible) or face-down (hidden)
data FaceCard
  = FaceUp   Card
  | FaceDown Card
  deriving (Show, Eq)

-- | Where a selected group of cards came from
data Src
  = SrcWaste
  | SrcFoundation Int
  | SrcTableau    Int
  deriving (Show, Eq)

-- | Application state
--   All pile lists: head = top of pile (most recently placed / accessible)
data Model = Model
  { _stock       :: [Card]         -- draw pile (face-down)
  , _waste       :: [Card]         -- discard pile; head = visible top
  , _foundations :: [[Card]]       -- 4 foundation piles
  , _tableau     :: [[FaceCard]]   -- 7 tableau columns
  , _selected    :: Maybe (Src, [Card])  -- currently held cards
  , _gameWon     :: Bool
  , _moves       :: Int
  } deriving (Show, Eq)
----------------------------------------------------------------------------
-- Lenses
----------------------------------------------------------------------------
stockL :: Lens Model [Card]
stockL = lens _stock (\\m x -> m { _stock = x })

wasteL :: Lens Model [Card]
wasteL = lens _waste (\\m x -> m { _waste = x })

foundationsL :: Lens Model [[Card]]
foundationsL = lens _foundations (\\m x -> m { _foundations = x })

tableauL :: Lens Model [[FaceCard]]
tableauL = lens _tableau (\\m x -> m { _tableau = x })

selectedL :: Lens Model (Maybe (Src, [Card]))
selectedL = lens _selected (\\m x -> m { _selected = x })

gameWonL :: Lens Model Bool
gameWonL = lens _gameWon (\\m x -> m { _gameWon = x })

movesL :: Lens Model Int
movesL = lens _moves (\\m x -> m { _moves = x })
----------------------------------------------------------------------------
-- Actions
----------------------------------------------------------------------------
data Action
  = Init                       -- start / restart game
  | Shuffled [Card]            -- shuffled deck delivered by IO
  | ClickStock                 -- draw from stock (or reset if empty)
  | ClickWaste                 -- select top of waste
  | ClickFoundation Int        -- click foundation pile i
  | ClickTableauCard Int Int   -- click tableau col i, card j from top (0=top)
  | ClickTableauCol  Int       -- click empty area / face-down card in col i
  | AutoComplete               -- move one card to a foundation (recursive)
  | ToggleFullscreen           -- toggle browser fullscreen
  deriving (Show, Eq)
----------------------------------------------------------------------------
-- Entry point
----------------------------------------------------------------------------
main :: IO ()
main = startApp defaultEvents app { mountPoint = Just "app" }
----------------------------------------------------------------------------
-- | Global CSS injected into <head> – handles pseudo-classes and keyframes
globalCSS :: MisoString
globalCSS = mconcat
  [ ".sol-card { transition: box-shadow 0.2s ease, transform 0.15s ease; } "
  , ".sol-card:hover { transform: translateY(-3px); } "
  , ".sol-col { transition: height 0.3s ease; } "
  , "@keyframes sol-win-in {"
  , "  from { opacity:0; transform: scale(0.85) translateY(20px); }"
  , "  to   { opacity:1; transform: scale(1) translateY(0); }"
  , "} "
  , ".sol-win { animation: sol-win-in 0.35s ease; } "
  , "* { -webkit-tap-highlight-color: transparent; } "
  , "button, .sol-card { touch-action: manipulation; } "
  , ".sol-board { transform-origin: top left; } "
  , "@media (max-width: 639px) { .sol-board { zoom: 0.85; } } "
  , "@media (max-width: 499px) { .sol-board { zoom: 0.73; } } "
  , "@media (max-width: 430px) { .sol-board { zoom: 0.64; } } "
  , "@media (max-width: 375px) { .sol-board { zoom: 0.58; } } "
  , "@media (max-width: 340px) { .sol-board { zoom: 0.52; } } "
  ]
----------------------------------------------------------------------------
app :: App Model Action
app = (component emptyModel updateModel viewModel)
        { mount = Just Init
        , styles = [Style globalCSS]
        }

emptyModel :: Model
emptyModel = Model [] [] (replicate 4 []) (replicate 7 []) Nothing False 0
----------------------------------------------------------------------------
-- Deck helpers
----------------------------------------------------------------------------
fullDeck :: [Card]
fullDeck = [ Card r s | s <- [minBound..maxBound], r <- [minBound..maxBound] ]

shuffleWith :: [Double] -> [Card] -> [Card]
shuffleWith rs = map snd . sortBy (comparing fst) . zip rs

isRed :: Card -> Bool
isRed c = cardSuit c == Hearts || cardSuit c == Diamonds

rankVal :: Rank -> Int
rankVal = fromEnum  -- Ace=0 .. King=12

getCard :: FaceCard -> Card
getCard (FaceUp   c) = c
getCard (FaceDown c) = c

isFaceUp :: FaceCard -> Bool
isFaceUp (FaceUp _) = True
isFaceUp _          = False

-- | Replace element at index i using a function
updateAt :: Int -> (a -> a) -> [a] -> [a]
updateAt i f = zipWith (\\j x -> if j == i then f x else x) [0..]

-- | After removing cards from a tableau column, flip a face-down top if needed
flipTop :: [FaceCard] -> [FaceCard]
flipTop (FaceDown c : rest) = FaceUp c : rest
flipTop col                 = col

-- | Split a deck into groups of increasing size: [1], [2], …, [n]
splitGroups :: [a] -> [[a]]
splitGroups xs = take 7 (go 1 xs)
  where
    go _ [] = []
    go n ys = take n ys : go (n + 1) (drop n ys)

-- | Build one tableau column; last card is face-up, rest face-down.
--   head = top = face-up card.
dealCol :: [Card] -> [FaceCard]
dealCol []  = []
dealCol [c] = [FaceUp c]
dealCol cs  = FaceUp (last cs) : map FaceDown (reverse (init cs))

-- | Deal a shuffled deck into the initial game state.
dealInitial :: [Card] -> Model
dealInitial deck = emptyModel
  { _stock   = drop 28 deck
  , _tableau = map dealCol (splitGroups deck)
  }
----------------------------------------------------------------------------
-- Game rules
----------------------------------------------------------------------------
-- | Can we place a run of cards on top of a tableau column?
canPlaceTableau :: [Card] -> [FaceCard] -> Bool
canPlaceTableau []    _                = True
canPlaceTableau cards []               = cardRank (last cards) == King
canPlaceTableau cards (FaceDown _ : _) = False
canPlaceTableau cards (FaceUp t   : _) =
  isRed (last cards) /= isRed t &&
  rankVal (cardRank (last cards)) + 1 == rankVal (cardRank t)

-- | Can we place a single card on a foundation pile?
canPlaceFoundation :: Card -> [Card] -> Bool
canPlaceFoundation c []    = cardRank c == Ace
canPlaceFoundation c (t:_) =
  cardSuit c == cardSuit t &&
  rankVal (cardRank c) == rankVal (cardRank t) + 1

-- | Remove n cards from the source pile; flip new tableau top if face-down.
removeFrom :: Src -> Int -> Model -> Model
removeFrom src n m = case src of
  SrcWaste        -> m { _waste       = drop n (_waste m) }
  SrcFoundation i -> m { _foundations = updateAt i (drop 1) (_foundations m) }
  SrcTableau    i -> m { _tableau     = updateAt i (flipTop . drop n) (_tableau m) }

-- | Place a single card on foundation i.
placeOnFoundation :: Int -> Card -> Model -> Model
placeOnFoundation i c m =
  let newF = updateAt i (c :) (_foundations m)
  in m { _foundations = newF
       , _moves       = _moves m + 1
       , _gameWon     = all ((== 13) . length) newF
       }

-- | Place a run of cards (face-up) on tableau column i.
placeOnTableau :: Int -> [Card] -> Model -> Model
placeOnTableau i cards m =
  m { _tableau = updateAt i (map FaceUp cards ++) (_tableau m)
    , _moves   = _moves m + 1
    }

-- | Find which foundation pile a card can be placed on.
findFoundationFor :: Card -> [[Card]] -> Maybe Int
findFoundationFor c founds =
  listToMaybe [ i | (i, f) <- zip [0..] founds, canPlaceFoundation c f ]

-- | Try to move one card automatically to a foundation (waste or tableau tops).
tryAutoMove :: Model -> Maybe Model
tryAutoMove m = listToMaybe $ mapMaybe id $
  tryFrom SrcWaste (take 1 (_waste m))
  : [ tryFrom (SrcTableau i) (faceUpTop (_tableau m !! i)) | i <- [0..6] ]
  where
    faceUpTop (FaceUp c : _) = [c]
    faceUpTop _              = []
    tryFrom src [c] =
      case findFoundationFor c (_foundations m) of
        Nothing -> Nothing
        Just fi ->
          Just (placeOnFoundation fi c (removeFrom src 1 m))
            { _selected = Nothing }
    tryFrom _ _ = Nothing
----------------------------------------------------------------------------
-- Update
----------------------------------------------------------------------------
updateModel :: Action -> Effect parent props Model Action
updateModel = \\case

  Init -> io $ do
    rs <- replicateRM 52
    pure (Shuffled (shuffleWith rs fullDeck))

  Shuffled deck ->
    put (dealInitial deck)

  ClickStock -> do
    m <- get
    let m0 = m { _selected = Nothing }
    case _stock m0 of
      []     -> put m0 { _stock = reverse (_waste m0), _waste = [] }
      (c:cs) -> put m0 { _stock = cs, _waste = c : _waste m0 }

  ClickWaste -> do
    m <- get
    case _waste m of
      []    -> pure ()
      (c:_) -> case _selected m of
        Just (SrcWaste, _) -> put m { _selected = Nothing }
        _                  -> put m { _selected = Just (SrcWaste, [c]) }

  ClickFoundation fi -> do
    m <- get
    let found = _foundations m !! fi
    case _selected m of
      Just (SrcFoundation si, _) | si == fi ->
        put m { _selected = Nothing }
      Just (src, [c]) | canPlaceFoundation c found -> do
        let m' = removeFrom src 1 m
        put (placeOnFoundation fi c m') { _selected = Nothing }
      Just _ ->
        case found of
          []    -> put m { _selected = Nothing }
          (c:_) -> put m { _selected = Just (SrcFoundation fi, [c]) }
      Nothing ->
        case found of
          []    -> pure ()
          (c:_) -> put m { _selected = Just (SrcFoundation fi, [c]) }

  ClickTableauCard ci cardFromTop -> do
    m <- get
    let col = _tableau m !! ci
    case _selected m of
      Just (SrcTableau si, _) | si == ci ->
        selectRun m ci col cardFromTop
      Just (src, cards) | canPlaceTableau cards col -> do
        let m' = removeFrom src (length cards) m
        put (placeOnTableau ci cards m') { _selected = Nothing }
      _ ->
        selectRun m ci col cardFromTop

  ClickTableauCol ci -> do
    m <- get
    let col = _tableau m !! ci
    case _selected m of
      Just (SrcTableau si, _) | si == ci ->
        put m { _selected = Nothing }
      Just (src, cards) | canPlaceTableau cards col -> do
        let m' = removeFrom src (length cards) m
        put (placeOnTableau ci cards m') { _selected = Nothing }
      _ ->
        put m { _selected = Nothing }

  AutoComplete -> do
    m <- get
    case tryAutoMove m of
      Nothing -> pure ()
      Just m' -> put m' >> issue AutoComplete

  ToggleFullscreen -> io_
    [js| document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen() |]

-- | Try to select the face-up run starting at cardFromTop in col ci.
selectRun :: Model -> Int -> [FaceCard] -> Int -> Effect parent props Model Action
selectRun m ci col cardFromTop =
  let slice = take (cardFromTop + 1) col
  in if not (null slice) && all isFaceUp slice
     then put m { _selected = Just (SrcTableau ci, map getCard slice) }
     else put m { _selected = Nothing }
----------------------------------------------------------------------------
-- View
----------------------------------------------------------------------------
viewModel :: props -> Model -> View Model Action
viewModel _ m =
  H.div_
    [ style_
        [ backgroundColor (hex "076324")
        , minHeight (vh 100.0)
        , fontFamily "Arial,Helvetica,sans-serif"
        , "user-select" =: "none"
        ]
    ]
    [ H.div_
        [ classList ["sol-board"]
        , style_
            [ padding (px 20)
            , boxSizing "border-box"
            ]
        ]
        [ viewHeader m
        , viewTopRow m
        , viewTableau m
        ]
    , if _gameWon m then viewWinOverlay else vfrag []
    ]

-- | Header: title, buttons, move counter
viewHeader :: Model -> View Model Action
viewHeader m =
  H.div_
    [ style_
        [ display "flex"
        , alignItems "center"
        , "flex-wrap" =: "wrap"
        , gap (px 12)
        , marginBottom (px 16)
        ]
    ]
    [ H.h2_
        [ style_ [ color white, margin "0", fontSize (px 20) ] ]
        [ text "\\x2660 Solitaire" ]
    , actionBtn "New Game"      Init
    , actionBtn "Auto Complete" AutoComplete
    , actionBtn "\\x26F6"        ToggleFullscreen
    , H.span_
        [ style_
            [ color (hex "c6f6d5")
            , fontSize (px 14)
            , marginLeft (px 8)
            ]
        ]
        [ text ("Moves: " <> ms (_moves m)) ]
    ]
  where
    actionBtn lbl act =
      H.button_
        [ H.onClick act
        , style_
            [ padding "6px 14px"
            , backgroundColor (hex "1a5c33")
            , color white
            , border "1px solid #2a8a55"
            , borderRadius (px 5)
            , cursor "pointer"
            , fontSize (px 13)
            ]
        ]
        [ text lbl ]

-- | Top row: stock | waste | spacer | 4 foundations
viewTopRow :: Model -> View Model Action
viewTopRow m =
  H.div_
    [ style_ [ display "flex", gap (px 10), marginBottom (px 16) ] ]
    [ viewStock m
    , viewWaste m
    , emptySlot []
    , viewFoundation 0 m
    , viewFoundation 1 m
    , viewFoundation 2 m
    , viewFoundation 3 m
    ]

-- | Stock pile
viewStock :: Model -> View Model Action
viewStock m = case _stock m of
  [] ->
    emptySlot
      [ H.onClick ClickStock
      , style_ [ cursor "pointer" ]
      ]
  _ ->
    H.div_
      [ H.onClick ClickStock
      , style_ (cardBackStyles ++ [ cursor "pointer" ])
      ]
      [ H.div_
          [ style_
              [ color (RGBA 255 255 255 0.55)
              , fontSize (px 11)
              , textAlign "center"
              , paddingTop (px 42)
              ]
          ]
          [ text (ms (length (_stock m))) ]
      ]

-- | Waste pile – fans up to 3 cards horizontally.
--   Oldest card sits at left=0; the newest (top/playable) card is at the right.
--   Only the top card has a click handler and the selection highlight.
viewWaste :: Model -> View Model Action
viewWaste m =
  let isSel   = isSrcSelected SrcWaste m
      visible = take 3 (_waste m)          -- [newest, 2nd, 3rd] (head = top)
      n       = length visible
  in H.div_
       [ style_ [ position "relative", width (px wasteW), height (px cardH) ] ]
       $ case visible of
           [] -> [ emptySlot [] ]
           _  ->
             [ let leftOff = (n - 1 - idx) * wasteOverlap
                   isTop   = idx == 0
                   selFlag = isTop && isSel
                   evts    = [ H.onClick ClickWaste | isTop ]
               in H.div_
                    ( classList ["sol-card"]
                    : style_ ( faceUpStyles c selFlag
                             ++ [ position "absolute"
                                , left (px leftOff)
                                , zIndex (ms (n - idx))
                                ] )
                    : evts
                    )
                    (cardContent c selFlag)
             | (idx, c) <- zip [0..] visible
             ]

-- | One foundation pile
viewFoundation :: Int -> Model -> View Model Action
viewFoundation fi m =
  let found = _foundations m !! fi
      isSel = isSrcSelected (SrcFoundation fi) m
  in case found of
    [] ->
      H.div_
        [ H.onClick (ClickFoundation fi)
        , style_ (emptySlotStyles ++ [ cursor "pointer" ])
        ]
        [ H.div_
            [ style_
                [ color (hex "4a9e6a")
                , fontSize (px 18)
                , fontWeight "bold"
                , textAlign "center"
                , lineHeight (px 96)
                ]
            ]
            [ text "A" ]
        ]
    (c:_) -> viewFaceCard c isSel [ H.onClick (ClickFoundation fi) ]

-- | Seven tableau columns
viewTableau :: Model -> View Model Action
viewTableau m =
  H.div_
    [ style_ [ display "flex", gap (px 10), alignItems "flex-start" ] ]
    [ viewTableauCol ci m | ci <- [0..6] ]

-- | One tableau column with absolutely-positioned stacked cards
viewTableauCol :: Int -> Model -> View Model Action
viewTableauCol ci m =
  let col     = _tableau m !! ci
      revCol  = reverse col          -- bottom card rendered first
      offsets = scanl (+) 0 (map faceOffset revCol)
      colH    = if null col then slotH else last offsets + cardH
  in H.div_
      [ classList ["sol-col"]
      , style_ [ position "relative", width (px cardW), height (px colH) ]
      ]
      $  emptySlot [ H.onClick (ClickTableauCol ci) ]
      :  [ renderTabCard ci m revCol topOff ri fc
         | (topOff, ri, fc) <- zip3 offsets [0..] revCol
         ]
  where
    faceOffset (FaceDown _) = 20
    faceOffset (FaceUp _)   = 28

-- | Render one tableau card at a given top offset
renderTabCard :: Int -> Model -> [FaceCard] -> Int -> Int -> FaceCard -> View Model Action
renderTabCard ci m revCol topOff ri fc =
  let cardFromTop = length revCol - 1 - ri
      isSel       = isTabSelected ci cardFromTop m
  in case fc of
    FaceDown _ ->
      H.div_
        [ H.onClick (ClickTableauCol ci)
        , style_ (cardBackStyles ++ [ position "absolute", top (px topOff) ])
        ]
        []
    FaceUp c ->
      H.div_
        [ classList ["sol-card"]
        , H.onClick (ClickTableauCard ci cardFromTop)
        , style_ (faceUpStyles c isSel ++ [ position "absolute", top (px topOff) ])
        ]
        (cardContent c isSel)

-- | Is a tableau card within the currently selected run?
isTabSelected :: Int -> Int -> Model -> Bool
isTabSelected ci cardFromTop m = case _selected m of
  Just (SrcTableau si, cards) -> si == ci && cardFromTop < length cards
  _                           -> False

-- | Is a given source the current selection origin?
isSrcSelected :: Src -> Model -> Bool
isSrcSelected src m = case _selected m of
  Just (s, _) -> s == src
  Nothing     -> False

----------------------------------------------------------------------------
cardW, cardH, slotH :: Int
cardW = 70
cardH = 100
slotH = 120

-- | Horizontal overlap between fanned waste cards
wasteOverlap :: Int
wasteOverlap = 16

-- | Fixed width of the waste area (room for up to 3 fanned cards)
wasteW :: Int
wasteW = cardW + 2 * wasteOverlap   -- 102 px

-- | Render a face-up card with optional selection highlight
viewFaceCard :: Card -> Bool -> [Attribute Action] -> View Model Action
viewFaceCard c isSel attrs =
  H.div_ (classList ["sol-card"] : style_ (faceUpStyles c isSel) : attrs) (cardContent c isSel)

-- | Inner content of a face-up card (top-left corner, centre, bottom-right)
cardContent :: Card -> Bool -> [View Model Action]
cardContent c _ =
  let col = if isRed c then hex "dc2626" else hex "111827"
  in [ H.div_
         [ style_
             [ position "absolute"
             , top (px 4), left (px 6)
             , fontSize (px 12), fontWeight "bold"
             , color col, lineHeight "1.3"
             ]
         ]
         [ text (rankStr (cardRank c)), H.br_ [], text (suitStr (cardSuit c)) ]
     , H.div_
         [ style_
             [ position "absolute"
             , top (pct 50.0), left (pct 50.0)
             , transform "translate(-50%,-50%)"
             , fontSize (px 26), color col
             ]
         ]
         [ text (suitStr (cardSuit c)) ]
     , H.div_
         [ style_
             [ position "absolute"
             , bottom (px 4), right (px 6)
             , fontSize (px 12), fontWeight "bold"
             , color col, lineHeight "1.3"
             , transform "rotate(180deg)"
             ]
         ]
         [ text (rankStr (cardRank c)), H.br_ [], text (suitStr (cardSuit c)) ]
     ]

-- | Styles for a face-up card (selected or not)
faceUpStyles :: Card -> Bool -> [Style]
faceUpStyles _ isSel =
  [ width (px cardW), height (px cardH)
  , borderRadius (px 8)
  , backgroundColor white
  , border "2px solid #ccc"
  , position "relative"
  , cursor "pointer"
  , transition "box-shadow 0.2s ease, transform 0.15s ease"
  , boxShadow (if isSel
      then "0 0 0 3px #fde047, 0 0 0 6px #f59e0b"
      else "0 2px 4px rgba(0,0,0,0.3)")
  ]

-- | Styles for a face-down card
cardBackStyles :: [Style]
cardBackStyles =
  [ width (px cardW), height (px cardH)
  , borderRadius (px 8)
  , border "2px solid #1e3a8a"
  , background "repeating-linear-gradient(45deg,#1e40af,#1e40af 5px,#2563eb 5px,#2563eb 10px)"
  , position "relative"

-- | Styles for an empty placeholder slot
emptySlotStyles :: [Style]
emptySlotStyles =
  [ width (px cardW), height (px cardH)
  , borderRadius (px 8)
  , border "2px dashed #4a9e6a"
  , background "rgba(0,0,0,0.12)"
  , position "relative"
  ]

-- | An empty placeholder slot element
emptySlot :: [Attribute Action] -> View Model Action
emptySlot attrs = H.div_ (style_ emptySlotStyles : attrs) []

-- | Rank as display string
rankStr :: Rank -> MisoString
rankStr = \\case
  Ace   -> "A";  Two   -> "2";  Three -> "3"
  Four  -> "4";  Five  -> "5";  Six   -> "6"
  Seven -> "7";  Eight -> "8";  Nine  -> "9"
  Ten   -> "10"; Jack  -> "J";  Queen -> "Q"; King -> "K"

-- | Suit unicode symbol
suitStr :: Suit -> MisoString
suitStr = \\case
  Clubs    -> "\\x2663"    -- ♣
  Diamonds -> "\\x2666"    -- ♦
  Hearts   -> "\\x2665"    -- ♥
  Spades   -> "\\x2660"    -- ♠

-- | Win overlay

      const examples = { counter: defaultSource, hello: helloExample, input: inputExample, solitaire: solitaireExample };

      });

      function parseGhcDiagnostics(lines) {
        // /tmp/Main.hs:LINE:COL: error: or /tmp/Main.hs:LINE:SCOL-ECOL: error: [GHC-XXXXX]
        const diagRe = /^[^:]+:(\d+):(\d+)(?:-(\d+))?\s*:\s*(error|warning)(?:\s*\[.*?\])?\s*:/;
        const markers = [];
        let i = 0;
        while (i < lines.length) {
          const raw = lines[i].replace(/\x1b\[[0-9;]*m/g, "");
          const m = diagRe.exec(raw);
          if (m) {
            const startLine = parseInt(m[1]);
            const startCol  = parseInt(m[2]);
            const endCol    = m[3] ? parseInt(m[3]) + 1 : startCol + 1;
            const severity  = m[4] === "error"
              ? monaco.MarkerSeverity.Error
              : monaco.MarkerSeverity.Warning;
            const afterLabel = raw.slice(raw.indexOf(m[4]) + m[4].length).replace(/^\s*(?:\[.*?\])?\s*:\s*/, "");
            const msgLines = afterLabel.trim() ? [afterLabel.trim()] : [];
            i++;
            while (i < lines.length) {
              const next = lines[i].replace(/\x1b\[[0-9;]*m/g, "");
              if (/^\s/.test(next)) { msgLines.push(next.trimStart()); i++; }
              else break;
            }
            markers.push({
              severity,
              startLineNumber: startLine,
              startColumn:     startCol,
              endLineNumber:   startLine,
              endColumn:       endCol,
              message:         msgLines.join("\n").trim(),
              source:          "GHC",
            });
          } else {
            i++;
          }
        }
        return markers;
      }

      splitter.addEventListener("mousedown", e => {
        e.preventDefault();
        splitter.classList.add("active");
        const startX  = e.clientX;
        const leftW0  = leftPane.getBoundingClientRect().width;
        const rightW0 = rightPane.getBoundingClientRect().width;
        const total   = leftW0 + rightW0;
        const onMove = e => {
          const newLeft  = Math.max(180, Math.min(total - 180, leftW0 + e.clientX - startX));
          leftPane.style.flex  = `0 0 ${newLeft}px`;
          rightPane.style.flex = `0 0 ${total - newLeft}px`;
          window.editor?.layout();
        };
        const onUp = () => {
          splitter.classList.remove("active");
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          window.editor?.layout();
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      // Draggable splitter between #app and #stdout

        const totalH   = appH0 + stdoutH0;
        const onMove = e => {
          const newTop = Math.max(60, Math.min(totalH - 60, appH0 + e.clientY - startY));
          appDiv.style.flex        = `0 0 ${newTop}px`;
          stdoutSection.style.flex = `0 0 ${totalH - newTop}px`;
        };
        const onUp = () => {
          rowSplitter.classList.remove("active");
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      document.getElementById("clearStdoutBtn").addEventListener("click", () => {
        document.getElementById("stdout").value = "";
      });

      document.getElementById("fullscreenBtn").addEventListener("click", () => {
        if (!document.fullscreenElement) {

        document.getElementById("fsEnterIcon").style.display = inFs ? "none" : "";
        document.getElementById("fsExitIcon").style.display = inFs ? "" : "none";
      });
